<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header class="card">
        <h1>Admin Dashboard</h1>
        <nav><a href="/" class="nav-link">Home Feed</a> | <a href="/logout">Logout</a></nav>
    </header>
    <main class="container">
        <h2>Manage All Posts</h2>
        <div id="admin-blogs"></div>
    </main>
    <script>
        async function loadAdminBlogs() {
            const res = await fetch("/blogs");
            const data = await res.json();
            const container = document.getElementById("admin-blogs");
            container.innerHTML = data.blogs.map(b => `
                <div class="card" style="margin-bottom:10px; padding:10px;">
                    <span><b>${b.title}</b> by ${b.author}</span>
                    <button onclick="deletePost(${b.id})" class="btn danger" style="float:right">Delete Any</button>
                </div>
            `).join("");
        }
        async function deletePost(id) {
            if(confirm('Delete this post?')) {
                await fetch(`/delete/${id}`, { method: 'DELETE' });
                loadAdminBlogs();
            }
        }
        loadAdminBlogs();
    </script>
</body>
</html>
