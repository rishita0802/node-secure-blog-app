<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <main class="container card">
        <h1>Login</h1>
        <form action="/login" method="post" class="form-container">
            <!-- Label change kiya taaki user ko pata chale ki kya daalna hai -->
            <label for="email">Username/Name:</label> 
            <!-- 'name' attribute ko 'email' hi rehne diya taaki backend se match kare -->
            <input type="text" id="email" name="email" required autocomplete="username"><br>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required autocomplete="current-password"><br>
            
            <button type="submit" class="btn primary">Login</button>
        </form>
        <p>Don't have an account? <a href="/signup">Signup here</a></p>
    </main>
</body>
</html>
