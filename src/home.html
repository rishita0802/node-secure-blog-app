<!DOCTYPE html>
<html>
<head>
    <title>Blog Feed</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header class="card">
        <div class="logo">NodeNexus</div>
        <nav>
            <span id="welcome-message" style="margin-right: 15px; font-weight: bold;"></span>
            <a href="/" class="nav-link">Home</a>
            <a href="/login" id="auth-link" class="nav-link">Login</a>
            <a href="/signup" id="signup-link" class="nav-link">Signup</a>
            <a href="/user/dashboard" id="create-link" class="nav-link" style="display:none;">Create Post</a>
            <a href="/admin/dashboard" id="admin-link" class="nav-link" style="display:none;">Admin Panel</a>
            <a href="/logout" id="logout-link" class="nav-link" style="display:none;">Logout</a>
        </nav>
    </header>

    <main class="container">
        <h2>Latest Blogs</h2>
        <p id="loading-indicator">Loading blogs...</p>
        <div id="blogs"></div>
    </main>

<script>
    let currentUser = null;

    function updateAuthUI() {
        const welcome = document.getElementById('welcome-message');
        const logoutLink = document.getElementById('logout-link');
        const createLink = document.getElementById('create-link');
        const adminLink = document.getElementById('admin-link');
        const authLink = document.getElementById('auth-link');
        const signupLink = document.getElementById('signup-link');

        if (currentUser) {
            welcome.textContent = `Welcome, ${currentUser.username}! (${currentUser.role})`;
            if(logoutLink) logoutLink.style.display = 'inline';
            if(createLink) createLink.style.display = 'inline';
            if(authLink) authLink.style.display = 'none';
            if(signupLink) signupLink.style.display = 'none';
            if(adminLink) adminLink.style.display = (currentUser.role === 'admin') ? 'inline' : 'none';
        } else {
            welcome.textContent = 'Welcome Guest!';
            if(logoutLink) logoutLink.style.display = 'none';
            if(createLink) createLink.style.display = 'none';
            if(adminLink) adminLink.style.display = 'none';
            if(authLink) authLink.style.display = 'inline';
            if(signupLink) signupLink.style.display = 'inline';
        }
    }

    function createBlogElement(blog) {
        const div = document.createElement("div");
        div.className = "blog-post card";

        const likesArr = blog.likes || [];
        const dislikesArr = blog.dislikes || [];
        const commentsArr = blog.comments || [];

        const hasLiked = currentUser && likesArr.includes(currentUser.username);
        const hasDisliked = currentUser && dislikesArr.includes(currentUser.username);
        const canDelete = currentUser && (currentUser.role === 'admin' || currentUser.username === blog.author);

        div.innerHTML = `
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <h3>${blog.title}</h3>
                ${canDelete ? `
                    <button class="btn danger" onclick="deletePost(${blog.id})" 
                        style="background:#ff4d4d; color:white; border:none; padding:5px 10px; cursor:pointer; border-radius:4px;">
                        Delete
                    </button>
                ` : ''}
            </div>
            <p class="author">By: ${blog.authorName || 'Anonymous'}</p>
            ${blog.image ? `<img src="/uploads1/${blog.image}" class="blog-image" style="max-width:100%; height:auto;">` : ''}
            <p>${blog.desc}</p>
            
            <div class="actions">
                <button class="btn ${hasLiked ? 'active-like' : ''}" onclick="handleLike(${blog.id})">
                    👍 ${likesArr.length}
                </button>
                <button class="btn ${hasDisliked ? 'active-dislike' : ''}" onclick="handleDislike(${blog.id})">
                    👎 ${dislikesArr.length}
                </button>
            </div>

            <div class="comments-section">
                <h4>Comments (${commentsArr.length})</h4>
                <div class="comment-list">
                    ${commentsArr.map(c => `<p style="border-bottom:1px solid #eee; padding:5px 0;"><b>${c.username}:</b> ${c.text}</p>`).join('')}
                </div>
                ${currentUser ? `
                    <div class="comment-box">
                        <input type="text" id="in-${blog.id}" placeholder="Add comment...">
                        <button onclick="submitComment(${blog.id})">Post</button>
                    </div>
                ` : '<p><a href="/login">Login</a> to comment</p>'}
            </div>
        `;
        return div;
    }

    async function fetchBlogs() {
        try {
            const res = await fetch("/blogs");
            const data = await res.json();
            currentUser = data.currentUser;
            updateAuthUI();

            const container = document.getElementById("blogs");
            document.getElementById('loading-indicator').style.display = 'none';
            container.innerHTML = data.blogs.length ? "" : "<p>No blogs found.</p>";

            data.blogs.forEach(blog => container.appendChild(createBlogElement(blog)));
        } catch (error) {
            console.error("Fetch Error:", error);
        }
    }

    // --- Interaction Functions ---
    async function handleLike(id) { await handleAction(id, 'like'); }
    async function handleDislike(id) { await handleAction(id, 'dislike'); }

    async function handleAction(id, type) {
        if(!currentUser) return alert("Please login first!");
        const res = await fetch(`/${type}/${id}`, { method: 'POST' });
        if(res.ok) fetchBlogs();
    }

    async function submitComment(id) {
        const input = document.getElementById(`in-${id}`);
        const comment = input.value.trim();
        if(!comment) return;

        const res = await fetch(`/comments/${id}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ comment })
        });
        if(res.ok) { input.value = ""; fetchBlogs(); }
    }

    async function deletePost(id) {
        if(confirm("Are you sure?")) {
            const res = await fetch(`/delete/${id}`, { method: 'DELETE' });
            if(res.ok) fetchBlogs();
        }
    }

    fetchBlogs();
</script>
</body>
</html>
